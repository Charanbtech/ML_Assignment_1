<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Risk Evaluator</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #2d3436;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #636e72;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #0984e3;
            outline: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #74b9ff;
            transform: translateY(-2px);
        }

        .prediction-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .risk-high {
            background-color: #d63031;
        }

        .risk-low {
            background-color: #00b894;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>💸 Loan Risk Evaluator</h2>

        <form method="POST">
            <div class="input-group">
                <label>Annual Income (in Lakhs):</label>
                <input type="number" step="0.1" name="income" value="{{ income }}" required placeholder="e.g. 4.5">
            </div>

            <div class="input-group">
                <label>Credit Score:</label>
                <input type="number" name="credit" value="{{ credit }}" required placeholder="e.g. 750">
            </div>

            <button type="submit">Evaluate Risk</button>
        </form>

        {% if result %}
        <div class="prediction-box {% if 'Yes' in result %}risk-high{% else %}risk-low{% endif %}">
            Default Prediction: {{ result }}
        </div>
        {% endif %}
    </div>

</body>

</html>
